[package]
name = "gleif-rs"
version = "0.1.0"
edition = "2021"

[dependencies]
reqwest = { version = "0.12", features = ["json"] }
tokio = { version = "1.43.0", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1.0.135"
chrono = { version = "0.4", features = ["serde"] }
thiserror = "2.0.11"
url = "2.2"
log = "0.4.25"
env_logger = "0.11.6"

[dev-dependencies]
mockito = "1.6.1"
